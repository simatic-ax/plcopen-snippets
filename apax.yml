# General information
name: '@simatic-ax/plcopen-snippets'
version: 0.0.0-placeholder
author: Siemens AG
# Description will be displayed in the apax extension
description: "Collection of PLCopen block templates as AX Code snippets for ST programming, including Execute and Enable variants for ST programming in SIMATIC AX"
type: generic
#URL to the repository
repository:
  type: git
  url: https://github.com/simatic-ax/plcopen-snippets
# Registry information, where the package will be published
registries:
  '@simatic-ax': 'https://npm.pkg.github.com/'
# Files, which will be shipped with the library
files:
  - 'README.md'
  - 'LICENSE.md'
  - 'doc'
  - 'snippets'
